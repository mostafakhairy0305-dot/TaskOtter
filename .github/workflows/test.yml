name: Test TaskOtter

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  itself:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: TaskOtter
        id: taskotter
        uses: ./
        with:
          github-token: ${{ github.token }}
          tasks: |
            - go
            - hadolint
            - yamllint
            - actionlint
            - zizmor
          node-package-manager: bun
          includes-doc: true
          target-folder: taskfiles

      - name: Print result
        shell: bash
        run: |
          echo "Changed: ${{ steps.taskotter.outputs.changed }}"
          echo "Source SHA: ${{ steps.taskotter.outputs.source-sha }}"
          echo "Pull request: ${{ steps.taskotter.outputs.pull-request-url }}"
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

      - name: Build binary
        run: go build -o /dev/null ./cmd/taskotter-sync

      - name: Build Docker image
        run: docker build -t taskotter:test .

      - name: Validate action metadata
        run: |
          test -f action.yml
          grep -q 'using: docker' action.yml

  integration:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Integration tests
        run: go test -race ./tests/integration/...
