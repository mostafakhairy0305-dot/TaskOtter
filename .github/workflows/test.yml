name: Test TaskOtter

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  itself:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: TaskOtter
        id: taskotter
        uses: ./
        with:
          github-token: ${{ github.token }}
          tasks: |
            go
            hadolint
            yamllint
            actionlint
            zizmor
            gh
          js: |
            runtime: bun
          includes-doc: true
          target-folder: taskfiles

      - name: Print result
        shell: bash
        run: |
          echo "Changed: ${{ steps.taskotter.outputs.changed }}"
          echo "Source SHA: ${{ steps.taskotter.outputs.source-sha }}"
          echo "Pull request: ${{ steps.taskotter.outputs.pull-request-url }}"

      - name: Fail if sync created a pull request
        if: steps.taskotter.outputs.changed == 'true'
        shell: bash
        env:
          PR_URL: ${{ steps.taskotter.outputs.pull-request-url }}
          PR_NUMBER: ${{ steps.taskotter.outputs.pull-request-number }}
          SOURCE_SHA: ${{ steps.taskotter.outputs.source-sha }}
        run: |
          if [ -n "$PR_URL" ]; then
            summary="TaskOtter opened sync PR #${PR_NUMBER:-unknown}: $PR_URL"
          else
            summary="TaskOtter synced taskfile changes but did not return a pull request URL."
          fi

          echo "::error title=TaskOtter sync required::${summary} Merge the sync pull request to update taskfiles, then re-run this workflow."
          echo "::notice title=What happened::TaskOtter compared managed files with the store and found drift. This job fails intentionally until the sync PR is merged."
          echo "Pull request: ${PR_URL:-none}"
          echo "Pull request number: ${PR_NUMBER:-none}"
          echo "Store source SHA: ${SOURCE_SHA:-unknown}"
          exit 1

      - name: Report TaskOtter sync success
        if: steps.taskotter.outputs.changed != 'true'
        shell: bash
        env:
          SOURCE_SHA: ${{ steps.taskotter.outputs.source-sha }}
        run: |
          echo "::notice title=TaskOtter sync up to date::Managed taskfiles match the store. No sync pull request was created."
          echo "Store source SHA: ${SOURCE_SHA:-unknown}"
  test:
    runs-on: ubuntu-latest
    needs: itself
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

      - name: Build binary
        run: go build -o /dev/null ./cmd/taskotter-sync

      - name: Build Docker image
        run: docker build -t taskotter:test .

      - name: Validate action metadata
        run: |
          test -f action.yml
          grep -q 'using: docker' action.yml
          grep -q '^name: TaskOtter Sync$' action.yml
          grep -q '^  icon: package$' action.yml
          grep -q '^  color: blue$' action.yml

  integration:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Integration tests
        run: go test -race ./tests/integration/...
