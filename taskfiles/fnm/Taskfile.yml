version: '3'

output:
  group:
    begin: "::group::{{.TASK}}"
    end: "::endgroup::"
    error_only: false

silent: true

vars:
  FNM_INSTALL_URL: https://fnm.vercel.app/install
  DEFAULT_NODE_VERSION: '--lts'
  FNM_LOAD: 'export PATH="$HOME/.local/bin:$PATH"'

tasks:
  default:
    desc: Show available fnm automation tasks
    summary: Display the list of available fnm-related tasks defined in this Taskfile.
    cmds:
      - task --list

  install:
    desc: Install fnm on the current operating system
    summary: Install fnm for the current platform and configure shell activation. Linux and macOS use the official install script. Windows uses winget. Shell activation is written to the current user's shell profile automatically.
    cmds:
      - task: _install:unix
      - task: _install:windows
      - task: shell:setup

  install:undo:
    desc: Remove fnm from the current operating system
    summary: Undo the fnm installation for the current platform. On Linux and macOS this removes the fnm binary from the local bin directory. On Windows this runs winget uninstall.
    aliases:
      - uninstall
    prompt:
      - This will remove fnm from this machine.
      - Node.js versions managed by fnm may also become unavailable.
      - Continue?
    cmds:
      - task: _install:undo:unix
      - task: _install:undo:windows

  version:
    desc: Show the installed fnm version
    summary: Print the currently installed fnm version for the active platform.
    deps:
      - install
    cmds:
      - task: _version:unix
      - task: _version:windows

  node:install:
    desc: Install a Node.js version with fnm
    summary: Install the Node.js version provided through VERSION. If VERSION is not provided, install the latest LTS version.
    aliases:
      - node:uninstall:undo
    deps:
      - install
    cmds:
      - task: _node:install:unix
        vars:
          VERSION: '{{default .DEFAULT_NODE_VERSION .VERSION}}'
      - task: _node:install:windows
        vars:
          VERSION: '{{default .DEFAULT_NODE_VERSION .VERSION}}'

  node:uninstall:
    desc: Uninstall a Node.js version managed by fnm
    summary: Remove the Node.js version provided through VERSION from the local fnm installation.
    aliases:
      - node:install:undo
    deps:
      - install
    requires:
      vars:
        - VERSION
    prompt:
      - This will uninstall Node.js {{.VERSION}} from fnm.
      - Any projects currently using this version may stop working until another version is selected.
      - Continue?
    cmds:
      - task: _node:uninstall:unix
        vars:
          VERSION: '{{.VERSION}}'
      - task: _node:uninstall:windows
        vars:
          VERSION: '{{.VERSION}}'

  node:use:
    desc: Switch to a Node.js version
    summary: Install (if needed) and activate the Node.js version provided through VERSION. If VERSION is not provided, use the latest LTS version.
    deps:
      - task: node:install
        vars:
          VERSION: '{{.VERSION}}'
    cmds:
      - task: _node:use:unix
        vars:
          VERSION: '{{default .DEFAULT_NODE_VERSION .VERSION}}'
      - task: _node:use:windows
        vars:
          VERSION: '{{default .DEFAULT_NODE_VERSION .VERSION}}'

  ls:
    desc: List Node.js versions installed through fnm
    summary: Show all Node.js versions installed and managed by fnm on the current machine.
    aliases:
      - list
    deps:
      - install
    cmds:
      - task: _ls:unix
      - task: _ls:windows

  node:version:
    desc: Show the active Node.js and npm versions
    summary: Print the currently active Node.js and npm versions available through fnm on the current platform.
    aliases:
      - node:current
      - node:active
    deps:
      - install
    cmds:
      - task: _node:version:unix
      - task: _node:version:windows

  shell:setup:
    desc: Configure fnm activation in the current user's shell profile
    summary: Detect the current shell and append the fnm env activation line to the appropriate shell profile file if not already present. Supports bash, zsh, and fish on Unix and PowerShell on Windows.
    cmds:
      - task: _shell:setup:unix
      - task: _shell:setup:windows

  _shell:setup:unix:
    internal: true
    desc: Configure fnm shell activation on Linux or macOS
    summary: Detect the current shell and add eval fnm env to the appropriate shell profile on Linux or macOS. Skipped if fnm activation is already present in any profile file.
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    status:
      - bash -c 'for f in "$HOME/.bashrc" "$HOME/.bash_profile" "$HOME/.profile" "$HOME/.zshrc" "$HOME/.zprofile" "$HOME/.config/fish/config.fish"; do grep -q "fnm env" "$f" 2>/dev/null && exit 0; done; exit 1'
    preconditions:
      - sh: command -v fnm >/dev/null 2>&1 || test -f "$HOME/.local/bin/fnm"
        msg: fnm is not installed. Run task install first.
    cmds:
      - echo Configuring fnm shell activation...
      - |
        export PATH="$HOME/.local/bin:$PATH"
        shell_name="$(basename "${SHELL:-}")"
        case "$shell_name" in
          bash)
            profile_candidates=("$HOME/.bashrc" "$HOME/.bash_profile" "$HOME/.profile")
            activation='eval "$(fnm env --use-on-cd --shell bash)"'
            ;;
          zsh)
            profile_candidates=("$HOME/.zshrc" "$HOME/.zprofile")
            activation='eval "$(fnm env --use-on-cd --shell zsh)"'
            ;;
          fish)
            profile_candidates=("$HOME/.config/fish/config.fish")
            activation="fnm env --use-on-cd --shell fish | source"
            ;;
          *)
            printf 'Shell "%s" is not auto-configured. Add fnm activation manually:\n' "${shell_name:-unknown}"
            printf '  eval "$(fnm env --use-on-cd)"\n'
            exit 0
            ;;
        esac
        for profile in "${profile_candidates[@]}"; do
          if [ -f "$profile" ] && grep -q "fnm env" "$profile" 2>/dev/null; then
            printf 'fnm is already activated in %s.\n' "$profile"
            exit 0
          fi
        done
        for profile in "${profile_candidates[@]}"; do
          if [ -f "$profile" ]; then
            printf '\n# fnm (Fast Node Manager)\n%s\n' "$activation" >> "$profile"
            printf 'fnm activation added to %s.\n' "$profile"
            printf 'Restart your shell or run: source %s\n' "$profile"
            exit 0
          fi
        done
        profile="${profile_candidates[0]}"
        mkdir -p "$(dirname "$profile")"
        printf '# fnm (Fast Node Manager)\n%s\n' "$activation" > "$profile"
        printf 'fnm activation added to %s.\n' "$profile"
        printf 'Restart your shell or run: source %s\n' "$profile"

  _shell:setup:windows:
    internal: true
    desc: Configure fnm shell activation on Windows
    summary: Add the fnm PowerShell activation line to the current user's PowerShell profile if not already present.
    platforms: [windows]
    status:
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "if ((Test-Path $PROFILE) -and (Select-String -Path $PROFILE -Pattern 'fnm env' -Quiet)) { exit 0 } else { exit 1 }"
    preconditions:
      - sh: powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Get-Command fnm -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
        msg: fnm is not installed or not available in PATH.
    cmds:
      - echo Configuring fnm PowerShell activation...
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "$line = 'fnm env --use-on-cd --shell powershell | Out-String | Invoke-Expression'; $p = $PROFILE; if (!(Test-Path $p)) { New-Item -Path $p -ItemType File -Force | Out-Null }; Add-Content -Path $p -Value (\"`n# fnm (Fast Node Manager)`n\" + $line); Write-Host \"fnm activation added to $p. Restart your terminal.\""

  _install:unix:
    internal: true
    desc: Install fnm on Linux or macOS via the official install script
    summary: Download and run the fnm install script on Linux or macOS. Installs the fnm binary to $HOME/.local/bin. Skipped if fnm is already available.
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    status:
      - command -v fnm >/dev/null 2>&1 || test -f "$HOME/.local/bin/fnm"
    preconditions:
      - sh: command -v curl >/dev/null 2>&1
        msg: curl is required to download the fnm installation script.
    cmds:
      - echo Installing fnm...
      - curl -fsSL "{{.FNM_INSTALL_URL}}" | bash
      - echo 'fnm installed. Restart your shell or add $HOME/.local/bin to PATH to use fnm.'

  _install:undo:unix:
    internal: true
    desc: Remove fnm on Linux or macOS
    summary: Remove the fnm binary from $HOME/.local/bin on Linux or macOS. Skipped if fnm is not present.
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    status:
      - '! command -v fnm >/dev/null 2>&1 && test ! -f "$HOME/.local/bin/fnm"'
    cmds:
      - echo Removing fnm from "$HOME/.local/bin/fnm"...
      - rm -f "$HOME/.local/bin/fnm"
      - echo fnm binary removed.
      - bash -c 'found=$(grep -rl "fnm env\|fnm\.sh" "$HOME/.bashrc" "$HOME/.bash_profile" "$HOME/.profile" "$HOME/.zshrc" 2>/dev/null || true); [ -n "$found" ] && echo "Manually remove fnm lines from:" && echo "$found" | sed "s/^/  /" || echo "No fnm references found in shell profile files."'

  _install:windows:
    internal: true
    desc: Install fnm on Windows via winget
    summary: Install fnm using winget on Windows. Skipped if fnm is already available.
    platforms: [windows]
    status:
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Get-Command fnm -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
    preconditions:
      - sh: powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Get-Command winget -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
        msg: winget is required to install fnm on Windows. Update Windows or install the App Installer from the Microsoft Store.
    cmds:
      - echo Installing fnm via winget...
      - winget install Schniz.fnm --accept-source-agreements --accept-package-agreements
      - echo fnm installed. Restart your terminal for PATH changes to take effect.

  _install:undo:windows:
    internal: true
    desc: Remove fnm on Windows via winget
    summary: Uninstall fnm using winget on Windows. Skipped if fnm is not present.
    platforms: [windows]
    status:
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Get-Command fnm -ErrorAction SilentlyContinue) { exit 1 } else { exit 0 }"
    cmds:
      - echo Removing fnm via winget...
      - winget uninstall Schniz.fnm
      - echo fnm removed. Restart your terminal.

  _version:unix:
    internal: true
    desc: Show fnm version on Linux or macOS
    summary: Print the installed fnm version on Linux or macOS.
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    preconditions:
      - sh: command -v fnm >/dev/null 2>&1 || test -f "$HOME/.local/bin/fnm"
        msg: fnm is not installed or not in PATH. Run task install first.
    cmds:
      - bash -lc '{{.FNM_LOAD}}; fnm --version'

  _version:windows:
    internal: true
    desc: Show fnm version on Windows
    summary: Print the installed fnm version on Windows.
    platforms: [windows]
    preconditions:
      - sh: powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Get-Command fnm -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
        msg: fnm is not installed or not available in PATH.
    cmds:
      - fnm --version

  _node:install:unix:
    internal: true
    desc: Install Node.js with fnm on Linux or macOS
    summary: Install the requested Node.js version using fnm on Linux or macOS. The default public value is --lts when VERSION is omitted.
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    requires:
      vars:
        - VERSION
    env:
      VERSION: '{{.VERSION}}'
    status:
      - bash -lc '{{.FNM_LOAD}}; if [ "{{.VERSION}}" = "--lts" ] || [ "{{.VERSION}}" = "latest" ]; then exit 1; fi; test -d "$(fnm root)/node-versions/v{{.VERSION}}"'
    preconditions:
      - sh: command -v fnm >/dev/null 2>&1 || test -f "$HOME/.local/bin/fnm"
        msg: fnm is not installed. Run task install first.
    cmds:
      - echo Installing Node.js {{.VERSION}} with fnm...
      - bash -lc '{{.FNM_LOAD}}; fnm install "$VERSION"'

  _node:install:windows:
    internal: true
    desc: Install Node.js with fnm on Windows
    summary: Install the requested Node.js version using fnm on Windows. The default public value is --lts when VERSION is omitted.
    platforms: [windows]
    requires:
      vars:
        - VERSION
    env:
      VERSION: '{{.VERSION}}'
    status:
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "$v = $env:VERSION; if ($v -eq '--lts' -or $v -eq 'latest') { exit 1 }; $root = & fnm root 2>$null; if ($root -and (Test-Path (Join-Path $root 'node-versions' ('v' + $v)))) { exit 0 } else { exit 1 }"
    preconditions:
      - sh: powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Get-Command fnm -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
        msg: fnm is not installed or not available in PATH.
    cmds:
      - echo Installing Node.js {{.VERSION}} with fnm...
      - fnm install %VERSION%

  _node:uninstall:unix:
    internal: true
    desc: Uninstall Node.js from fnm on Linux or macOS
    summary: Remove the requested Node.js version from the local fnm installation on Linux or macOS.
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    requires:
      vars:
        - VERSION
    env:
      VERSION: '{{.VERSION}}'
    status:
      - bash -lc '{{.FNM_LOAD}}; test ! -d "$(fnm root)/node-versions/v{{.VERSION}}"'
    preconditions:
      - sh: command -v fnm >/dev/null 2>&1 || test -f "$HOME/.local/bin/fnm"
        msg: fnm is not installed. Run task install first.
    cmds:
      - echo Uninstalling Node.js {{.VERSION}} with fnm...
      - bash -lc '{{.FNM_LOAD}}; fnm uninstall "$VERSION"'

  _node:uninstall:windows:
    internal: true
    desc: Uninstall Node.js from fnm on Windows
    summary: Remove the requested Node.js version from the local fnm installation on Windows.
    platforms: [windows]
    requires:
      vars:
        - VERSION
    env:
      VERSION: '{{.VERSION}}'
    status:
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "$v = $env:VERSION; $root = & fnm root 2>$null; if (-not $root -or -not (Test-Path (Join-Path $root 'node-versions' ('v' + $v)))) { exit 0 } else { exit 1 }"
    preconditions:
      - sh: powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Get-Command fnm -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
        msg: fnm is not installed or not available in PATH.
    cmds:
      - echo Uninstalling Node.js {{.VERSION}} with fnm...
      - fnm uninstall %VERSION%

  _node:use:unix:
    internal: true
    desc: Activate a Node.js version with fnm on Linux or macOS
    summary: Switch to the requested Node.js version and set it as the default for new shells on Linux or macOS.
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    requires:
      vars:
        - VERSION
    env:
      VERSION: '{{.VERSION}}'
    preconditions:
      - sh: command -v fnm >/dev/null 2>&1 || test -f "$HOME/.local/bin/fnm"
        msg: fnm is not installed. Run task install first.
      - sh: bash -lc '{{.FNM_LOAD}}; if [ "{{.VERSION}}" = "--lts" ] || [ "{{.VERSION}}" = "latest" ]; then exit 0; fi; test -d "$(fnm root)/node-versions/v{{.VERSION}}"'
        msg: Node.js {{.VERSION}} is not installed. Run task node:install VERSION={{.VERSION}} first.
    cmds:
      - echo Switching to Node.js {{.VERSION}}...
      - bash -lc '{{.FNM_LOAD}}; fnm use "$VERSION"; fnm default "$(fnm current)"'
      - echo 'Node.js {{.VERSION}} set as default. Run eval "$(fnm env)" to activate in the current shell session.'

  _node:use:windows:
    internal: true
    desc: Activate a Node.js version with fnm on Windows
    summary: Switch to the requested Node.js version and set it as the default for new shells on Windows.
    platforms: [windows]
    requires:
      vars:
        - VERSION
    env:
      VERSION: '{{.VERSION}}'
    preconditions:
      - sh: powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Get-Command fnm -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
        msg: fnm is not installed or not available in PATH.
      - sh: powershell -NoProfile -ExecutionPolicy Bypass -Command "$v = $env:VERSION; if ($v -eq '--lts' -or $v -eq 'latest') { exit 0 }; $root = & fnm root 2>$null; if ($root -and (Test-Path (Join-Path $root 'node-versions' ('v' + $v)))) { exit 0 } else { exit 1 }"
        msg: Node.js {{.VERSION}} is not installed. Run task node:install VERSION={{.VERSION}} first.
    cmds:
      - echo Switching to Node.js {{.VERSION}}...
      - fnm use %VERSION%
      - fnm default %VERSION%

  _ls:unix:
    internal: true
    desc: List Node.js versions from fnm on Linux or macOS
    summary: Show all Node.js versions installed through fnm on Linux or macOS.
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    preconditions:
      - sh: command -v fnm >/dev/null 2>&1 || test -f "$HOME/.local/bin/fnm"
        msg: fnm is not installed. Run task install first.
    cmds:
      - bash -lc '{{.FNM_LOAD}}; fnm list'

  _ls:windows:
    internal: true
    desc: List Node.js versions from fnm on Windows
    summary: Show all Node.js versions installed through fnm on Windows.
    platforms: [windows]
    preconditions:
      - sh: powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Get-Command fnm -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
        msg: fnm is not installed or not available in PATH.
    cmds:
      - fnm list

  _node:version:unix:
    internal: true
    desc: Show active Node.js version on Linux or macOS
    summary: Print the active Node.js and npm versions available after loading fnm on Linux or macOS.
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    preconditions:
      - sh: command -v fnm >/dev/null 2>&1 || test -f "$HOME/.local/bin/fnm"
        msg: fnm is not installed. Run task install first.
    cmds:
      - bash -lc '{{.FNM_LOAD}}; eval "$(fnm env 2>/dev/null)"; fnm current; node --version; npm --version'

  _node:version:windows:
    internal: true
    desc: Show active Node.js version on Windows
    summary: Print the active Node.js and npm versions available on Windows through fnm.
    platforms: [windows]
    preconditions:
      - sh: powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Get-Command fnm -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
        msg: fnm is not installed or not available in PATH.
      - sh: powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Get-Command node -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
        msg: node is not available in PATH. Run task node:use first.
    cmds:
      - fnm current
      - node --version
      - npm --version
