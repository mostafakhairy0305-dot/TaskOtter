---
version: "3"
includes:
  go:
    taskfile: go/Taskfile.yml
    vars:
      INSTALL_DIR_UNIX: "/usr/local"
      GO_ROOT_UNIX: "{{.INSTALL_DIR_UNIX}}/go"
      GO_BIN_UNIX: "{{.GO_ROOT_UNIX}}/bin"
      GO_CMD_UNIX: "{{.GO_BIN_UNIX}}/go"
      GO_VERSION_URL: https://go.dev/VERSION?m=text
      GO_DOWNLOAD_BASE_URL: https://go.dev/dl
      GO_VERSION: ""
      GOLANGCI_LINT_VERSION: ""
      GOVULNCHECK_VERSION: ""
      GOSEC_VERSION: ""
      GO_FMT_SKIP_PATTERN: ""
      GO_LINT_SKIP_PATTERN: ""
      GO_COVER_PROFILE: ""
      GO_FUZZTIME: ""
      # Formatter selection shared by every golangci-lint fmt invocation (both the
      # skip-pattern and plain paths, on Unix and Windows). Kept in one place so the
      # four call sites cannot drift apart.
      GO_FMT_FORMATTER_FLAGS: >-
        -E gci -E gofmt -E gofumpt -E goimports -E golines -E swaggo
      GLOBAL_GO_BIN:
        sh: |
          gobin="${GOBIN:-}"
          if [ -z "$gobin" ] && command -v go >/dev/null 2>&1; then
            gobin="$(go env GOBIN)"
          fi
          if [ -z "$gobin" ]; then
            gopath="${GOPATH:-}"
            if [ -z "$gopath" ] && command -v go >/dev/null 2>&1; then
              gopath="$(go env GOPATH)"
            fi
            gobin="${gopath:-$HOME/go}/bin"
          fi
          printf '%s' "$gobin"
  hadolint:
    taskfile: hadolint/Taskfile.yml
    vars:
      HADOLINT_LINT_SKIP_PATTERN: ""
      CONFIG: ""
      DOCKERFILE: "Dockerfile"
      EXTRA_ARGS: ""
      HADOLINT_VERSION: "2.14.0"
  yamllint:
    taskfile: yamllint/Taskfile.yml
    vars:
      YAMLLINT_LINT_SKIP_PATTERN: ""
      UV_LOAD: 'export PATH="$HOME/.local/bin:$PATH"'
      TARGETS: "."
      CONFIG: ""
      EXTRA_ARGS: ""
      YAMLLINT_VERSION: ""
      YAMLFIX_VERSION: ""
  actionlint:
    taskfile: actionlint/Taskfile.yml
    vars:
      ACTIONLINT_LINT_SKIP_PATTERN: ""
      ACTIONLINT_VERSION: "1.7.12"
      ACTIONLINT_EXTRA_ARGS: ""
      ACTIONLINT_TARGETS: ""
  zizmor:
    taskfile: zizmor/Taskfile.yml
    vars:
      ZIZMOR_LINT_SKIP_PATTERN: ""
      ZIZMOR_EXTRA_ARGS: "--offline"
      ZIZMOR_TARGETS: ".github"
      ZIZMOR_VERSION: "1.25.2"
  gh:
    taskfile: gh/Taskfile.yml
    vars:
      VISIBILITY: "public"
      BASE: "main"
      MERGE_METHOD: "merge"
      CLONE_DIR: "."
      DOWNLOAD_DIR: "."
      DATA: "{}"
      PAT_TOKEN: ""
      VERSION: ""
