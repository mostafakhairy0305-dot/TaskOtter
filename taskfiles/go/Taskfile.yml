version: '3'

output:
  group:
    begin: "::group::{{.TASK}}"
    end: "::endgroup::"
    error_only: false

silent: true

vars:
  INSTALL_DIR_UNIX: '/usr/local'
  GO_ROOT_UNIX: '{{.INSTALL_DIR_UNIX}}/go'
  GO_BIN_UNIX: '{{.GO_ROOT_UNIX}}/bin'
  GO_CMD_UNIX: '{{.GO_BIN_UNIX}}/go'
  GO_VERSION_URL: https://go.dev/VERSION?m=text
  GO_DOWNLOAD_BASE_URL: https://go.dev/dl

tasks:
  default:
    desc: Show available Go automation tasks
    summary: Display the list of available Go-related tasks defined in this Taskfile.
    cmds:
      - task --list

  install:
    desc: Install Go on the current operating system
    summary: |
      Install Go for the current platform if it is not already available.
      macOS uses Homebrew. Linux downloads the latest official tarball from
      go.dev, installs it under INSTALL_DIR_UNIX, and configures the shell
      profile for GO_BIN_UNIX. Windows downloads and runs the official MSI.
    cmds:
      - task: _install:macos:brew
      - task: _install:linux:tarball
      - task: _install:windows:msi
      - task: _shell:setup:linux

  upgrade:
    desc: Upgrade Go to the latest stable release
    summary: |
      Upgrade Go for the current platform. macOS uses Homebrew. Linux replaces
      the existing INSTALL_DIR_UNIX/go tree with the latest official tarball.
      Windows downloads and runs the latest official MSI.
    cmds:
      - task: _upgrade:macos:brew
      - task: _install:linux:tarball
        vars:
          FORCE: 'true'
      - task: _install:windows:msi
        vars:
          FORCE: 'true'
      - task: _shell:setup:linux
        vars:
          FORCE: 'true'

  version:
    desc: Show the installed Go version
    summary: Print the active Go toolchain version via `go version`. Auto-installs Go if missing.
    deps:
      - install
    cmds:
      - task: _version:unix
      - task: _version:windows

  which:
    desc: Show the path to the Go binary
    summary: Print the Go binary resolved from PATH, falling back to GO_CMD_UNIX on Linux. Auto-installs Go if missing.
    deps:
      - install
    cmds:
      - task: _which:unix
      - task: _which:windows

  verify:
    desc: Verify the Go installation and environment
    summary: |
      Check that Go is installed, print the active version, and show the
      resolved GOROOT and GOPATH values for quick installation diagnostics.
      Auto-installs Go if missing.
    deps:
      - install
    cmds:
      - task: _verify:unix
      - task: _verify:windows

  _install:macos:brew:
    internal: true
    desc: Install Go on macOS using Homebrew
    summary: Run `brew install go` on macOS. Skipped if Go is already available.
    platforms: [darwin]
    set: [errexit, nounset, pipefail]
    status:
      - command -v go >/dev/null 2>&1
    preconditions:
      - sh: command -v brew >/dev/null 2>&1
        msg: Homebrew is required to install Go on macOS. Install it from https://brew.sh and re-run this task.
    cmds:
      - echo 'Installing Go via Homebrew...'
      - brew update
      - brew install go
      - echo 'Go installed successfully.'

  _upgrade:macos:brew:
    internal: true
    desc: Upgrade Go on macOS using Homebrew
    summary: Run `brew upgrade go` on macOS, installing Go first if the formula is not present.
    platforms: [darwin]
    set: [errexit, nounset, pipefail]
    preconditions:
      - sh: command -v brew >/dev/null 2>&1
        msg: Homebrew is required to upgrade Go on macOS. Install it from https://brew.sh and re-run this task.
    cmds:
      - echo 'Upgrading Go via Homebrew...'
      - brew update
      - cmd: brew upgrade go
        if: brew list go >/dev/null 2>&1
      - cmd: brew install go
        if: '! brew list go >/dev/null 2>&1'

  _install:linux:tarball:
    internal: true
    desc: Install Go on Linux using the official tarball
    summary: |
      Download the latest Go Linux tarball from go.dev, replace INSTALL_DIR_UNIX/go,
      and extract the new toolchain. Skipped when Go is already available unless
      FORCE is true. Requires sudo when not running as root.
    platforms: [linux]
    set: [errexit, nounset, pipefail]
    vars:
      GO_UNAME_ARCH:
        sh: uname -m
      GO_LINUX_ARCH: '{{if or (eq .GO_UNAME_ARCH "x86_64") (eq .GO_UNAME_ARCH "amd64")}}amd64{{else if or (eq .GO_UNAME_ARCH "aarch64") (eq .GO_UNAME_ARCH "arm64")}}arm64{{else if eq .GO_UNAME_ARCH "armv6l"}}armv6l{{else if or (eq .GO_UNAME_ARCH "i386") (eq .GO_UNAME_ARCH "i686")}}386{{else if eq .GO_UNAME_ARCH "ppc64le"}}ppc64le{{else if eq .GO_UNAME_ARCH "s390x"}}s390x{{else}}{{.GO_UNAME_ARCH}}{{end}}'
      GO_LINUX_ARCH_SUPPORTED: '{{if or (eq .GO_LINUX_ARCH "amd64") (eq .GO_LINUX_ARCH "arm64") (eq .GO_LINUX_ARCH "armv6l") (eq .GO_LINUX_ARCH "386") (eq .GO_LINUX_ARCH "ppc64le") (eq .GO_LINUX_ARCH "s390x")}}true{{else}}false{{end}}'
      GO_VERSION_FILE_UNIX: '/tmp/taskotter-go-version.txt'
      GO_TARBALL_FILE_UNIX: '/tmp/taskotter-go-{{.GO_LINUX_ARCH}}.tar.gz'
    status:
      - '[ "{{default "false" .FORCE}}" != "true" ]'
      - command -v go >/dev/null 2>&1
    preconditions:
      - sh: command -v curl >/dev/null 2>&1
        msg: curl is required to download Go.
      - sh: command -v tar >/dev/null 2>&1
        msg: tar is required to extract Go.
      - sh: command -v uname >/dev/null 2>&1
        msg: uname is required to detect the system architecture.
      - sh: '[ "{{.GO_LINUX_ARCH_SUPPORTED}}" = "true" ]'
        msg: Unsupported Linux architecture {{.GO_UNAME_ARCH}}.
      - sh: 'test "$(id -u)" -eq 0 || command -v sudo >/dev/null 2>&1'
        msg: sudo is required to install Go under INSTALL_DIR_UNIX when not running as root.
    cmds:
      - curl -fsSL "{{.GO_VERSION_URL}}" -o "{{.GO_VERSION_FILE_UNIX}}"
      - echo "Downloading $(sed -n '1p' "{{.GO_VERSION_FILE_UNIX}}").linux-{{.GO_LINUX_ARCH}}.tar.gz..."
      - curl -fL "{{.GO_DOWNLOAD_BASE_URL}}/$(sed -n '1p' "{{.GO_VERSION_FILE_UNIX}}").linux-{{.GO_LINUX_ARCH}}.tar.gz" -o "{{.GO_TARBALL_FILE_UNIX}}"
      - echo "Installing Go to {{.GO_ROOT_UNIX}}..."
      - cmd: rm -rf "{{.GO_ROOT_UNIX}}"
        if: '[ "$(id -u)" -eq 0 ]'
      - cmd: sudo rm -rf "{{.GO_ROOT_UNIX}}"
        if: '[ "$(id -u)" -ne 0 ]'
      - cmd: tar -C "{{.INSTALL_DIR_UNIX}}" -xzf "{{.GO_TARBALL_FILE_UNIX}}"
        if: '[ "$(id -u)" -eq 0 ]'
      - cmd: sudo tar -C "{{.INSTALL_DIR_UNIX}}" -xzf "{{.GO_TARBALL_FILE_UNIX}}"
        if: '[ "$(id -u)" -ne 0 ]'
      - cmd: rm -f "{{if eq .ITEM "version"}}{{.GO_VERSION_FILE_UNIX}}{{else}}{{.GO_TARBALL_FILE_UNIX}}{{end}}"
        for:
          - version
          - tarball
      - echo "Go installed to {{.GO_ROOT_UNIX}}."

  _install:windows:msi:
    internal: true
    desc: Install Go on Windows using the official MSI
    summary: |
      Download the latest Go Windows MSI from go.dev and install it quietly.
      Skipped when Go is already available unless FORCE is true.
    platforms: [windows]
    status:
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "if ('{{default "false" .FORCE}}' -eq 'true') { exit 1 }; if (Get-Command go -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
    preconditions:
      - sh: powershell -NoProfile -ExecutionPolicy Bypass -Command "if ($env:PROCESSOR_ARCHITECTURE -eq 'AMD64' -or $env:PROCESSOR_ARCHITECTURE -eq 'ARM64') { exit 0 } else { exit 1 }"
        msg: Go MSI install supports AMD64 and ARM64 Windows architectures.
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "((Invoke-RestMethod -Uri '{{.GO_VERSION_URL}}') -split \"`n\")[0].Trim() | Set-Content -NoNewline -Path (Join-Path $env:TEMP 'taskotter-go-version.txt')"
      - cmd: powershell -NoProfile -ExecutionPolicy Bypass -Command "$version = (Get-Content -Path (Join-Path $env:TEMP 'taskotter-go-version.txt') -Raw).Trim(); Write-Host \"Downloading $version.windows-amd64.msi...\"; Invoke-WebRequest -Uri \"{{.GO_DOWNLOAD_BASE_URL}}/$version.windows-amd64.msi\" -OutFile (Join-Path $env:TEMP 'taskotter-go.msi')"
        if: powershell -NoProfile -ExecutionPolicy Bypass -Command "if ($env:PROCESSOR_ARCHITECTURE -eq 'AMD64') { exit 0 } else { exit 1 }"
      - cmd: powershell -NoProfile -ExecutionPolicy Bypass -Command "$version = (Get-Content -Path (Join-Path $env:TEMP 'taskotter-go-version.txt') -Raw).Trim(); Write-Host \"Downloading $version.windows-arm64.msi...\"; Invoke-WebRequest -Uri \"{{.GO_DOWNLOAD_BASE_URL}}/$version.windows-arm64.msi\" -OutFile (Join-Path $env:TEMP 'taskotter-go.msi')"
        if: powershell -NoProfile -ExecutionPolicy Bypass -Command "if ($env:PROCESSOR_ARCHITECTURE -eq 'ARM64') { exit 0 } else { exit 1 }"
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "Start-Process msiexec.exe -Wait -ArgumentList @('/i', (Join-Path $env:TEMP 'taskotter-go.msi'), '/quiet', '/norestart')"
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "Remove-Item (Join-Path $env:TEMP 'taskotter-go-version.txt'), (Join-Path $env:TEMP 'taskotter-go.msi') -Force -ErrorAction SilentlyContinue"

  _shell:setup:linux:
    internal: true
    desc: Configure Go PATH on Linux
    summary: Add GO_BIN_UNIX to the current user's shell profile if it is not already available.
    platforms: [linux]
    set: [errexit, nounset, pipefail]
    status:
      - '[ "{{default "false" .FORCE}}" != "true" ] && command -v go >/dev/null 2>&1'
    cmds:
      - task: _shell:setup:linux:profile
        vars:
          FORCE: '{{.FORCE}}'
          GO_PROFILE: '$HOME/.zshrc'
        if: '[ "$(basename "${SHELL:-}")" = "zsh" ]'
      - task: _shell:setup:linux:profile
        vars:
          FORCE: '{{.FORCE}}'
          GO_PROFILE: '$HOME/.bashrc'
        if: '[ "$(basename "${SHELL:-}")" = "bash" ]'
      - task: _shell:setup:linux:profile
        vars:
          FORCE: '{{.FORCE}}'
          GO_PROFILE: '$HOME/.profile'
        if: '[ "$(basename "${SHELL:-}")" != "zsh" ] && [ "$(basename "${SHELL:-}")" != "bash" ]'

  _shell:setup:linux:profile:
    internal: true
    desc: Configure Go PATH in a Linux shell profile
    summary: Add GO_BIN_UNIX to the selected Linux shell profile if it is not already available.
    platforms: [linux]
    set: [errexit, nounset, pipefail]
    requires:
      vars:
        - GO_PROFILE
    status:
      - '[ "{{default "false" .FORCE}}" != "true" ] && command -v go >/dev/null 2>&1 || grep -qF "{{.GO_BIN_UNIX}}" "{{.GO_PROFILE}}" 2>/dev/null'
    cmds:
      - touch "{{.GO_PROFILE}}"
      - cmd: printf '\n# Go\n' >> "{{.GO_PROFILE}}"
        if: '! grep -qF "{{.GO_BIN_UNIX}}" "{{.GO_PROFILE}}" 2>/dev/null'
      - cmd: printf 'export PATH="$PATH:{{.GO_BIN_UNIX}}"\n' >> "{{.GO_PROFILE}}"
        if: '! grep -qF "{{.GO_BIN_UNIX}}" "{{.GO_PROFILE}}" 2>/dev/null'
      - echo "Go PATH added to {{.GO_PROFILE}}. Restart your shell or run export PATH=\"\$PATH:{{.GO_BIN_UNIX}}\"."

  _version:unix:
    internal: true
    desc: Show Go version on macOS or Linux
    summary: Print `go version` on macOS or Linux.
    platforms: [linux, darwin]
    preconditions:
      - sh: command -v go >/dev/null 2>&1 || test -x "{{.GO_CMD_UNIX}}"
        msg: Go is not installed or not available in PATH.
    cmds:
      - cmd: go version
        if: command -v go >/dev/null 2>&1
      - cmd: '"{{.GO_CMD_UNIX}}" version'
        if: '! command -v go >/dev/null 2>&1'

  _version:windows:
    internal: true
    desc: Show Go version on Windows
    summary: Print `go version` on Windows.
    platforms: [windows]
    preconditions:
      - sh: powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Get-Command go -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
        msg: Go is not installed or not available in PATH.
    cmds:
      - go version

  _which:unix:
    internal: true
    desc: Show Go binary path on macOS or Linux
    summary: Print the Go binary path resolved by the current PATH on macOS or Linux.
    platforms: [linux, darwin]
    preconditions:
      - sh: command -v go >/dev/null 2>&1 || test -x "{{.GO_CMD_UNIX}}"
        msg: Go is not installed or not available in PATH.
    cmds:
      - cmd: command -v go
        if: command -v go >/dev/null 2>&1
      - cmd: printf '%s\n' '{{.GO_CMD_UNIX}}'
        if: '! command -v go >/dev/null 2>&1'

  _which:windows:
    internal: true
    desc: Show Go binary path on Windows
    summary: Print the Go binary path resolved by PowerShell on Windows.
    platforms: [windows]
    preconditions:
      - sh: powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Get-Command go -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
        msg: Go is not installed or not available in PATH.
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "(Get-Command go).Source"

  _verify:unix:
    internal: true
    desc: Verify Go on macOS or Linux
    summary: Print Go version, GOROOT, and GOPATH on macOS or Linux.
    platforms: [linux, darwin]
    preconditions:
      - sh: command -v go >/dev/null 2>&1 || test -x "{{.GO_CMD_UNIX}}"
        msg: Go is not installed or not available in PATH.
    cmds:
      - cmd: go version
        if: command -v go >/dev/null 2>&1
      - cmd: '"{{.GO_CMD_UNIX}}" version'
        if: '! command -v go >/dev/null 2>&1'
      - cmd: go env GOROOT GOPATH
        if: command -v go >/dev/null 2>&1
      - cmd: '"{{.GO_CMD_UNIX}}" env GOROOT GOPATH'
        if: '! command -v go >/dev/null 2>&1'

  _verify:windows:
    internal: true
    desc: Verify Go on Windows
    summary: Print Go version, GOROOT, and GOPATH on Windows.
    platforms: [windows]
    preconditions:
      - sh: powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Get-Command go -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
        msg: Go is not installed or not available in PATH.
    cmds:
      - go version
      - go env GOROOT GOPATH
