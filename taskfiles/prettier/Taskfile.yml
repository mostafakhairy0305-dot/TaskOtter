---
version: "3"

output:
  group:
    begin: "::group::{{.TASK}}"
    end: "::endgroup::"
    error_only: false

silent: true

includes:
  js:
    taskfile: ../js-pm/Taskfile.yml

vars:
  PM: ""
  TARGETS: ""
  PRETTIER_DEFAULT_TARGETS: "."
  CONFIG: ""
  IGNORE_PATH: ""
  PRETTIER_DEFAULT_IGNORE_PATH: ".prettierignore"
  EXTRA_ARGS: ""

tasks:
  default:
    desc: Show available Prettier tasks
    cmds:
      - task --list

  install:
    desc: Install Prettier as a local devDependency
    cmds:
      - task: js:install
        vars:
          PM: "{{if .PM_OVERRIDE}}{{.PM_OVERRIDE}}{{else}}{{.PM}}{{end}}"
          PACKAGES: prettier
          EXTRA_ARGS: "{{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}}"
          CLI_ARGS: "{{.CLI_ARGS}}"

  config:init:
    desc: Create a starter Prettier config when none exists
    vars:
      PRETTIER_CONFIG_PATH: >-
        {{if .CONFIG_OVERRIDE}}{{.CONFIG_OVERRIDE}}
        {{- else}}{{if .CONFIG}}{{.CONFIG}}
        {{- else}}.prettierrc.json{{end}}{{end}}
    status:
      - test -f "{{.PRETTIER_CONFIG_PATH}}"
    cmds:
      - "printf '{\\n' > \"{{.PRETTIER_CONFIG_PATH}}\""
      - "printf '  \"singleQuote\": true,\\n' >> \"{{.PRETTIER_CONFIG_PATH}}\""
      - "printf '  \"semi\": true\\n' >> \"{{.PRETTIER_CONFIG_PATH}}\""
      - "printf '}\\n' >> \"{{.PRETTIER_CONFIG_PATH}}\""
      - echo 'Created {{.PRETTIER_CONFIG_PATH}}.'

  check:
    desc: Check formatting with Prettier
    cmds:
      - task: js:exec:ignore
        vars:
          PM: "{{if .PM_OVERRIDE}}{{.PM_OVERRIDE}}{{else}}{{.PM}}{{end}}"
          BINARY: prettier
          ARGS: >-
            {{if .PRETTIER_TARGETS_OVERRIDE}}{{.PRETTIER_TARGETS_OVERRIDE}}
            {{else}}{{if .TARGETS}}{{.TARGETS}}{{else}}{{.PRETTIER_DEFAULT_TARGETS}}{{end}}{{end}}
            --check
            {{if .CONFIG_OVERRIDE}}--config "{{.CONFIG_OVERRIDE}}"
            {{else}}{{if .CONFIG}}--config "{{.CONFIG}}" {{end}}{{end}}
          IGNORE_PATH: >-
            {{if .IGNORE_PATH_OVERRIDE}}{{.IGNORE_PATH_OVERRIDE}}
            {{- else}}{{if .IGNORE_PATH}}{{.IGNORE_PATH}}
            {{- else}}{{.PRETTIER_DEFAULT_IGNORE_PATH}}{{end}}{{end}}
          EXTRA_ARGS: >-
            {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}
            {{else}}{{if .EXTRA_ARGS}}{{.EXTRA_ARGS}}{{end}}{{end}}
          CLI_ARGS: "{{.CLI_ARGS}}"
      - echo "✅ prettier passed"

  write:
    desc: Format files with Prettier
    cmds:
      - task: js:exec:ignore
        vars:
          PM: "{{if .PM_OVERRIDE}}{{.PM_OVERRIDE}}{{else}}{{.PM}}{{end}}"
          BINARY: prettier
          ARGS: >-
            {{if .PRETTIER_TARGETS_OVERRIDE}}{{.PRETTIER_TARGETS_OVERRIDE}}
            {{else}}{{if .TARGETS}}{{.TARGETS}}{{else}}{{.PRETTIER_DEFAULT_TARGETS}}{{end}}{{end}}
            --write
            {{if .CONFIG_OVERRIDE}}--config "{{.CONFIG_OVERRIDE}}"
            {{else}}{{if .CONFIG}}--config "{{.CONFIG}}" {{end}}{{end}}
          IGNORE_PATH: >-
            {{if .IGNORE_PATH_OVERRIDE}}{{.IGNORE_PATH_OVERRIDE}}
            {{- else}}{{if .IGNORE_PATH}}{{.IGNORE_PATH}}
            {{- else}}{{.PRETTIER_DEFAULT_IGNORE_PATH}}{{end}}{{end}}
          EXTRA_ARGS: >-
            {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}
            {{else}}{{if .EXTRA_ARGS}}{{.EXTRA_ARGS}}{{end}}{{end}}
          CLI_ARGS: "{{.CLI_ARGS}}"
      - echo "✅ prettier fixes applied"

  fix:
    desc: Alias for prettier:write
    cmds:
      - task: write

  ci:
    desc: Alias for prettier:check
    cmds:
      - task: check

  version:
    desc: Show the locally resolved Prettier version
    cmds:
      - task: js:exec
        vars:
          PM: "{{if .PM_OVERRIDE}}{{.PM_OVERRIDE}}{{else}}{{.PM}}{{end}}"
          BINARY: prettier
          ARGS: "--version"

  help:
    desc: Show Prettier CLI help
    cmds:
      - task: js:exec
        vars:
          PM: "{{if .PM_OVERRIDE}}{{.PM_OVERRIDE}}{{else}}{{.PM}}{{end}}"
          BINARY: prettier
          ARGS: "--help"
          EXTRA_ARGS: "{{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}}"
          CLI_ARGS: "{{.CLI_ARGS}}"
