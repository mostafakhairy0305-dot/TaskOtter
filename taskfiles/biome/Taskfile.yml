---
# yamllint disable rule:line-length
version: "3"

output:
  group:
    begin: "::group::{{.TASK}}"
    end: "::endgroup::"
    error_only: false

silent: true

includes:
  js:
    taskfile: ../js-pm/Taskfile.yml

vars:
  PM: ""
  TARGETS: ""
  BIOME_DEFAULT_TARGETS: "."
  CONFIG: ""
  EXTRA_ARGS: ""

tasks:
  default:
    desc: Show available Biome tasks
    cmds:
      - task --list

  install:
    desc: Install Biome as a local devDependency
    cmds:
      - task: js:install
        vars:
          PM: "{{if .PM_OVERRIDE}}{{.PM_OVERRIDE}}{{else}}{{.PM}}{{end}}"
          PACKAGES: "@biomejs/biome"
          EXTRA_ARGS: "{{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}}"
          CLI_ARGS: "{{.CLI_ARGS}}"

  init:
    desc: Alias for biome:config:init
    cmds:
      - task: config:init

  config:init:
    desc: Create a biome.json config file in the current directory
    summary: |
      Run biome init to generate a biome.json config file with recommended
      defaults. Skipped if biome.json or biome.jsonc already exists.
    status:
      - test -f biome.json || test -f biome.jsonc
    cmds:
      - task: js:exec
        vars:
          PM: "{{if .PM_OVERRIDE}}{{.PM_OVERRIDE}}{{else}}{{.PM}}{{end}}"
          BINARY: biome
          ARGS: init
          EXTRA_ARGS: "{{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}}"
          CLI_ARGS: "{{.CLI_ARGS}}"

  check:
    desc: Run Biome check
    cmds:
      - task: js:exec
        vars:
          PM: "{{if .PM_OVERRIDE}}{{.PM_OVERRIDE}}{{else}}{{.PM}}{{end}}"
          BINARY: biome
          ARGS: 'check {{if .CONFIG_OVERRIDE}}--config-path "{{.CONFIG_OVERRIDE}}" {{else}}{{if .CONFIG}}--config-path "{{.CONFIG}}" {{end}}{{end}}{{if .BIOME_TARGETS_OVERRIDE}}{{.BIOME_TARGETS_OVERRIDE}}{{else}}{{if .TARGETS}}{{.TARGETS}}{{else}}{{.BIOME_DEFAULT_TARGETS}}{{end}}{{end}}'
          EXTRA_ARGS: "{{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{if .EXTRA_ARGS}}{{.EXTRA_ARGS}}{{end}}{{end}}"
          CLI_ARGS: "{{.CLI_ARGS}}"
      - echo "✅ biome passed"

  check:write:
    desc: Run Biome check and write safe fixes
    cmds:
      - task: js:exec
        vars:
          PM: "{{if .PM_OVERRIDE}}{{.PM_OVERRIDE}}{{else}}{{.PM}}{{end}}"
          BINARY: biome
          ARGS: 'check --write {{if .CONFIG_OVERRIDE}}--config-path "{{.CONFIG_OVERRIDE}}" {{else}}{{if .CONFIG}}--config-path "{{.CONFIG}}" {{end}}{{end}}{{if .BIOME_TARGETS_OVERRIDE}}{{.BIOME_TARGETS_OVERRIDE}}{{else}}{{if .TARGETS}}{{.TARGETS}}{{else}}{{.BIOME_DEFAULT_TARGETS}}{{end}}{{end}}'
          EXTRA_ARGS: "{{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{if .EXTRA_ARGS}}{{.EXTRA_ARGS}}{{end}}{{end}}"
          CLI_ARGS: "{{.CLI_ARGS}}"
      - echo "✅ biome fixes applied"

  fix:
    desc: Alias for biome:check:write
    cmds:
      - task: check:write

  lint:
    desc: Run Biome lint
    cmds:
      - task: js:exec
        vars:
          PM: "{{if .PM_OVERRIDE}}{{.PM_OVERRIDE}}{{else}}{{.PM}}{{end}}"
          BINARY: biome
          ARGS: 'lint {{if .CONFIG_OVERRIDE}}--config-path "{{.CONFIG_OVERRIDE}}" {{else}}{{if .CONFIG}}--config-path "{{.CONFIG}}" {{end}}{{end}}{{if .BIOME_TARGETS_OVERRIDE}}{{.BIOME_TARGETS_OVERRIDE}}{{else}}{{if .TARGETS}}{{.TARGETS}}{{else}}{{.BIOME_DEFAULT_TARGETS}}{{end}}{{end}}'
          EXTRA_ARGS: "{{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{if .EXTRA_ARGS}}{{.EXTRA_ARGS}}{{end}}{{end}}"
          CLI_ARGS: "{{.CLI_ARGS}}"
      - echo "✅ biome passed"

  lint:fix:
    desc: Run Biome lint and write fixes
    cmds:
      - task: js:exec
        vars:
          PM: "{{if .PM_OVERRIDE}}{{.PM_OVERRIDE}}{{else}}{{.PM}}{{end}}"
          BINARY: biome
          ARGS: 'lint --write {{if .CONFIG_OVERRIDE}}--config-path "{{.CONFIG_OVERRIDE}}" {{else}}{{if .CONFIG}}--config-path "{{.CONFIG}}" {{end}}{{end}}{{if .BIOME_TARGETS_OVERRIDE}}{{.BIOME_TARGETS_OVERRIDE}}{{else}}{{if .TARGETS}}{{.TARGETS}}{{else}}{{.BIOME_DEFAULT_TARGETS}}{{end}}{{end}}'
          EXTRA_ARGS: "{{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{if .EXTRA_ARGS}}{{.EXTRA_ARGS}}{{end}}{{end}}"
          CLI_ARGS: "{{.CLI_ARGS}}"
      - echo "✅ biome fixes applied"

  format:
    desc: Check formatting with Biome
    cmds:
      - task: js:exec
        vars:
          PM: "{{if .PM_OVERRIDE}}{{.PM_OVERRIDE}}{{else}}{{.PM}}{{end}}"
          BINARY: biome
          ARGS: 'format {{if .CONFIG_OVERRIDE}}--config-path "{{.CONFIG_OVERRIDE}}" {{else}}{{if .CONFIG}}--config-path "{{.CONFIG}}" {{end}}{{end}}{{if .BIOME_TARGETS_OVERRIDE}}{{.BIOME_TARGETS_OVERRIDE}}{{else}}{{if .TARGETS}}{{.TARGETS}}{{else}}{{.BIOME_DEFAULT_TARGETS}}{{end}}{{end}}'
          EXTRA_ARGS: "{{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{if .EXTRA_ARGS}}{{.EXTRA_ARGS}}{{end}}{{end}}"
          CLI_ARGS: "{{.CLI_ARGS}}"

  format:write:
    desc: Format files with Biome
    cmds:
      - task: js:exec
        vars:
          PM: "{{if .PM_OVERRIDE}}{{.PM_OVERRIDE}}{{else}}{{.PM}}{{end}}"
          BINARY: biome
          ARGS: 'format --write {{if .CONFIG_OVERRIDE}}--config-path "{{.CONFIG_OVERRIDE}}" {{else}}{{if .CONFIG}}--config-path "{{.CONFIG}}" {{end}}{{end}}{{if .BIOME_TARGETS_OVERRIDE}}{{.BIOME_TARGETS_OVERRIDE}}{{else}}{{if .TARGETS}}{{.TARGETS}}{{else}}{{.BIOME_DEFAULT_TARGETS}}{{end}}{{end}}'
          EXTRA_ARGS: "{{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{if .EXTRA_ARGS}}{{.EXTRA_ARGS}}{{end}}{{end}}"
          CLI_ARGS: "{{.CLI_ARGS}}"
      - echo "✅ biome fixes applied"

  ci:
    desc: Run Biome CI checks
    cmds:
      - task: js:exec
        vars:
          PM: "{{if .PM_OVERRIDE}}{{.PM_OVERRIDE}}{{else}}{{.PM}}{{end}}"
          BINARY: biome
          ARGS: 'ci {{if .CONFIG_OVERRIDE}}--config-path "{{.CONFIG_OVERRIDE}}" {{else}}{{if .CONFIG}}--config-path "{{.CONFIG}}" {{end}}{{end}}{{if .BIOME_TARGETS_OVERRIDE}}{{.BIOME_TARGETS_OVERRIDE}}{{else}}{{if .TARGETS}}{{.TARGETS}}{{else}}{{.BIOME_DEFAULT_TARGETS}}{{end}}{{end}}'
          EXTRA_ARGS: "{{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{if .EXTRA_ARGS}}{{.EXTRA_ARGS}}{{end}}{{end}}"
          CLI_ARGS: "{{.CLI_ARGS}}"
      - echo "✅ biome passed"

  cache:clean:
    desc: Remove common Biome cache directories if present
    cmds:
      - if [ -d .cache/biome ]; then rm -rf .cache/biome; fi
      - if [ -d node_modules/.cache/biome ]; then rm -rf node_modules/.cache/biome; fi

  version:
    desc: Show the locally resolved Biome version
    cmds:
      - task: js:exec
        vars:
          PM: "{{if .PM_OVERRIDE}}{{.PM_OVERRIDE}}{{else}}{{.PM}}{{end}}"
          BINARY: biome
          ARGS: "--version"

  help:
    desc: Show Biome CLI help
    cmds:
      - task: js:exec
        vars:
          PM: "{{if .PM_OVERRIDE}}{{.PM_OVERRIDE}}{{else}}{{.PM}}{{end}}"
          BINARY: biome
          ARGS: "--help"
          EXTRA_ARGS: "{{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}}"
          CLI_ARGS: "{{.CLI_ARGS}}"
