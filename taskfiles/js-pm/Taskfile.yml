---
version: "3"

silent: true

includes:
  npm:
    taskfile: ../npm/Taskfile.yml
    optional: true
  yarn:
    taskfile: ../yarn/Taskfile.yml
    optional: true
  pnpm:
    taskfile: ../pnpm/Taskfile.yml
    optional: true
  bun:
    taskfile: ../bun/Taskfile.yml
    optional: true

vars:
  PM: ""
  PACKAGES: ""
  BINARY: ""
  ARGS: ""
  EXTRA_ARGS: ""
  IGNORE_PATH: ""
  IGNORE_FLAG: "--ignore-path"

tasks:
  install:
    internal: true
    desc: Install JavaScript packages as local devDependencies
    requires:
      vars: [PACKAGES]
    vars:
      _PM:
        sh: |
          pm="{{.PM}}"
          if [ -n "$pm" ]; then echo "$pm"; exit; fi
          if [ -f bun.lock ] || [ -f bun.lockb ]; then echo "bun"
          elif [ -f pnpm-lock.yaml ]; then echo "pnpm"
          elif [ -f yarn.lock ]; then echo "yarn"
          else echo "npm"; fi
    cmds:
      - |
        case "{{._PM}}" in
          npm|pnpm|yarn|bun) task {{._PM}}:add PACKAGES="{{.PACKAGES}}" EXTRA_ARGS="{{.EXTRA_ARGS}}" ;;
          *) printf 'Unsupported PM="%s". Use npm, pnpm, yarn, or bun.\n' "{{._PM}}" >&2; exit 1 ;;
        esac

  exec:
    internal: true
    desc: Execute a local JavaScript project binary with the selected package manager
    requires:
      vars: [BINARY]
    vars:
      _PM:
        sh: |
          pm="{{.PM}}"
          if [ -n "$pm" ]; then echo "$pm"; exit; fi
          if [ -f bun.lock ] || [ -f bun.lockb ]; then echo "bun"
          elif [ -f pnpm-lock.yaml ]; then echo "pnpm"
          elif [ -f yarn.lock ]; then echo "yarn"
          else echo "npm"; fi
    cmds:
      - |
        if [ ! -f "node_modules/.bin/{{.BINARY}}" ]; then
          task install PACKAGES="{{.BINARY}}" PM="{{._PM}}"
        fi
      - |
        case "{{._PM}}" in
          npm|pnpm|yarn|bun) task {{._PM}}:exec BINARY="{{.BINARY}}" \
            ARGS="{{.ARGS}}" \
            EXTRA_ARGS="{{.EXTRA_ARGS}}{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}" ;;
          *) printf 'Unsupported PM="%s". Use npm, pnpm, yarn, or bun.\n' "{{._PM}}" >&2; exit 1 ;;
        esac

  exec:ignore:
    internal: true
    desc: Execute a local JavaScript project binary and include an ignore file when present
    requires:
      vars: [BINARY]
    vars:
      _IGNORE_ARGS:
        sh: |
          if [ -n "{{.IGNORE_PATH}}" ] && [ -f "{{.IGNORE_PATH}}" ]; then
            echo "{{.IGNORE_FLAG}} {{.IGNORE_PATH}}"
          fi
    cmds:
      - task: exec
        vars:
          BINARY: "{{.BINARY}}"
          ARGS: "{{.ARGS}} {{._IGNORE_ARGS}}"
          EXTRA_ARGS: "{{.EXTRA_ARGS}}"
          PM: "{{.PM}}"
          CLI_ARGS: "{{.CLI_ARGS}}"
