---
version: "3"

silent: true

includes:
  npm:
    taskfile: ../npm/Taskfile.yml
    optional: true
  yarn:
    taskfile: ../yarn/Taskfile.yml
    optional: true
  pnpm:
    taskfile: ../pnpm/Taskfile.yml
    optional: true
  bun:
    taskfile: ../bun/Taskfile.yml
    optional: true

vars:
  PM: ""
  PACKAGES: ""
  BINARY: ""
  ARGS: ""
  EXTRA_ARGS: ""
  IGNORE_PATH: ""
  IGNORE_FLAG: "--ignore-path"

tasks:
  install:
    internal: true
    desc: Install JavaScript packages as local devDependencies
    requires:
      vars: [PACKAGES]
    vars:
      _PM:
        sh: |
          pm="{{.PM}}"
          if [ -n "$pm" ]; then echo "$pm"; exit; fi
          if [ -f bun.lock ] || [ -f bun.lockb ]; then echo "bun"
          elif [ -f pnpm-lock.yaml ]; then echo "pnpm"
          elif [ -f yarn.lock ]; then echo "yarn"
          else echo "npm"; fi
    preconditions:
      - sh: echo "{{._PM}}" | grep -qE '^(npm|pnpm|yarn|bun)$'
        msg: 'Unsupported PM="{{._PM}}". Use npm, pnpm, yarn, or bun.'
    cmds:
      - task: "{{._PM}}:add"
        vars:
          PACKAGES: "{{.PACKAGES}}"
          EXTRA_ARGS: "{{.EXTRA_ARGS}}"

  exec:
    internal: true
    desc: Execute a local JavaScript project binary with the selected package manager
    requires:
      vars: [BINARY]
    vars:
      _PM:
        sh: |
          pm="{{.PM}}"
          if [ -n "$pm" ]; then echo "$pm"; exit; fi
          if [ -f bun.lock ] || [ -f bun.lockb ]; then echo "bun"
          elif [ -f pnpm-lock.yaml ]; then echo "pnpm"
          elif [ -f yarn.lock ]; then echo "yarn"
          else echo "npm"; fi
    preconditions:
      - sh: echo "{{._PM}}" | grep -qE '^(npm|pnpm|yarn|bun)$'
        msg: 'Unsupported PM="{{._PM}}". Use npm, pnpm, yarn, or bun.'
    cmds:
      - task: _install-if-missing
        vars:
          BINARY: "{{.BINARY}}"
          PM: "{{._PM}}"
      - task: "{{._PM}}:exec"
        vars:
          BINARY: "{{.BINARY}}"
          ARGS: "{{.ARGS}}"
          EXTRA_ARGS: "{{.EXTRA_ARGS}}{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}"

  _install-if-missing:
    internal: true
    requires:
      vars: [BINARY]
    vars:
      _PM:
        sh: |
          pm="{{.PM}}"
          if [ -n "$pm" ]; then echo "$pm"; exit; fi
          if [ -f bun.lock ] || [ -f bun.lockb ]; then echo "bun"
          elif [ -f pnpm-lock.yaml ]; then echo "pnpm"
          elif [ -f yarn.lock ]; then echo "yarn"
          else echo "npm"; fi
    status:
      - command -v {{.BINARY}} >/dev/null 2>&1
    cmds:
      - task: "{{._PM}}:add"
        vars:
          PACKAGES: "{{.BINARY}}"

  exec:ignore:
    internal: true
    desc: Execute a local JavaScript project binary and include an ignore file when present
    requires:
      vars: [BINARY]
    vars:
      _IGNORE_ARGS:
        sh: |
          if [ -n "{{.IGNORE_PATH}}" ] && [ -f "{{.IGNORE_PATH}}" ]; then
            echo "{{.IGNORE_FLAG}} {{.IGNORE_PATH}}"
          fi
    cmds:
      - task: exec
        vars:
          BINARY: "{{.BINARY}}"
          ARGS: "{{.ARGS}} {{._IGNORE_ARGS}}"
          EXTRA_ARGS: "{{.EXTRA_ARGS}}"
          PM: "{{.PM}}"
          CLI_ARGS: "{{.CLI_ARGS}}"
