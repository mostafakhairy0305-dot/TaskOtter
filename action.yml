---
name: TaskOtter Sync
description: Synchronize taskfiles from the TaskOtter store into your repository.
author: mostafakhairy0305-dot
branding:
  icon: package
  color: blue
inputs:
  tasks:
    description: Comma-separated or multiline list of logical task names.
    required: true
  js:
    description: |
      YAML settings for Node.js task resolution.
      runtime: bun | nodejs (default nodejs)
      When runtime is nodejs: package-manager npm | yarn | pnpm (default npm),
      version-manager fnm | nvm (default fnm).
    required: false
    default: ''
  includes-doc:
    description: Whether to copy module documentation (README.md and docs/).
    required: false
    default: 'true'
  sync-root:
    description: Whether to create or update the repository root Taskfile.yml.
    required: false
    default: 'true'
  store-version:
    description: Specific Git tag from the store. Empty uses the default branch HEAD.
    required: false
    default: ''
  target-folder:
    description: Repository-relative destination directory for synchronized modules.
    required: false
    default: taskfiles
  github-token:
    description: Token used to push the sync branch and create or update a pull request.
    required: true
  fail-on-changes:
    description: |
      When true, exit with a failure after opening or updating a sync pull request.
      Use in CI jobs that should block until the sync PR is merged.
    required: false
    default: 'false'
outputs:
  changed:
    description: Whether repository changes were generated.
  store-version:
    description: Requested store tag, or empty when the latest default branch was
      used.
  source-ref:
    description: Resolved source reference (refs/tags/... or refs/heads/...).
  source-sha:
    description: Immutable source commit SHA.
  target-folder:
    description: Normalized target folder path.
  resolved-tasks:
    description: JSON map of requested tasks with source and destination modules.
  resolved-dependencies:
    description: JSON array of resolved dependency modules.
  pull-request-number:
    description: Created or updated pull request number.
  pull-request-url:
    description: Created or updated pull request URL.
runs:
  using: docker
  image: Dockerfile
