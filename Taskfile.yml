---
version: "3"
includes:
    taskotter:
        taskfile: taskfiles/Taskfile.yml
tasks:
    lint:
        desc: Run all configured lint and security checks
        deps:
            - taskotter:go:lint
            - taskotter:hadolint:lint
            - taskotter:yamllint:lint
            - taskotter:actionlint:lint
            - taskotter:zizmor:lint
    lint:fix:
        desc: Auto-fix lint and formatting issues where supported
        deps:
            - taskotter:go:lint:fix
            - taskotter:yamllint:lint:fix
    fmt:
        desc: Format Go and YAML files
        deps:
            - taskotter:go:fmt
    fmt:check:
        desc: Check Go and YAML formatting without modifying files
        deps:
            - taskotter:go:fmt:check
    ci:
        desc: Run all CI checks
        cmds:
            - task: fmt:check
            - task: lint
    ci:fix:
        desc: Run all CI checks
        cmds:
            - task: fmt
            - task: lint:fix
