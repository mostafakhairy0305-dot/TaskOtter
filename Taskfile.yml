version: "3"
includes:
    go:
        taskfile: taskfiles/go/Taskfile.yml
        vars:
            INSTALL_DIR_UNIX: "/usr/local"
            GO_ROOT_UNIX: "{{.INSTALL_DIR_UNIX}}/go"
            GO_BIN_UNIX: "{{.GO_ROOT_UNIX}}/bin"
            GO_CMD_UNIX: "{{.GO_BIN_UNIX}}/go"
            GO_VERSION_URL: https://go.dev/VERSION?m=text
            GO_DOWNLOAD_BASE_URL: https://go.dev/dl
            GO_VERSION: ""
            GOLANGCI_LINT_VERSION: ""
            GOFUMPT_VERSION: ""
            GOIMPORTS_VERSION: ""
            GOVULNCHECK_VERSION: ""
            GOSEC_VERSION: ""
            GLOBAL_GO_BIN:
                sh: |
                    gobin="${GOBIN:-}"
                    if [ -z "$gobin" ] && command -v go >/dev/null 2>&1; then
                      gobin="$(go env GOBIN)"
                    fi
                    if [ -z "$gobin" ]; then
                      gopath="${GOPATH:-}"
                      if [ -z "$gopath" ] && command -v go >/dev/null 2>&1; then
                        gopath="$(go env GOPATH)"
                      fi
                      gobin="${gopath:-$HOME/go}/bin"
                    fi
                    printf '%s' "$gobin"
            SPM_GO_VERSION: ""
    eslint:
        taskfile: taskfiles/eslint/Taskfile.yml
        vars:
            TARGETS: ""
            ESLINT_DEFAULT_TARGETS: "src/**/*.{js,jsx,ts,tsx}"
            CONFIG: ""
            CACHE: ""
            ESLINT_DEFAULT_CACHE: "true"
            EXTRA_ARGS: ""
            VERSION: ""
    prettier:
        taskfile: taskfiles/prettier/Taskfile.yml
        vars:
            TARGETS: ""
            PRETTIER_DEFAULT_TARGETS: "."
            CONFIG: ""
            IGNORE_PATH: ""
            PRETTIER_DEFAULT_IGNORE_PATH: ".prettierignore"
            EXTRA_ARGS: ""
            VERSION: ""
    typescript:
        taskfile: taskfiles/typescript/Taskfile.yml
        vars:
            FILE: src/index.ts
            OUTFILE: dist/index.js
            OUT_DIR: dist
            TSCONFIG: tsconfig.json
            TSX_FLAGS: ""
            TSC_FLAGS: ""
            TRACE_DIR: .tsc-trace
            VERSION: ""
tasks:
    lint:
        desc: Run all configured lint and security checks
        deps:
            - go:lint
            - hadolint:lint
            - yamllint:lint
            - actionlint:lint
            - zizmor:lint
    lint:fix:
        desc: Auto-fix lint and formatting issues where supported
        deps:
            - go:lint:fix
            - yamllint:lint:fix
    fmt:
        desc: Format Go and YAML files
        deps:
            - go:fmt
    fmt:check:
        desc: Check Go and YAML formatting without modifying files
        deps:
            - go:fmt:check
    ci:
        desc: Run all CI checks
        cmds:
            - task: fmt:check
            - task: lint
