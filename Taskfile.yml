---
version: "3"

includes:
  ansible:
    taskfile: taskfiles/ansible/Taskfile.yml
    vars:
      PLAYBOOK_OVERRIDE: "{{.PLAYBOOK}}"
      INVENTORY_OVERRIDE: "{{.INVENTORY}}"
      TARGETS_OVERRIDE: "{{.TARGETS}}"
      EXTRA_ARGS_OVERRIDE: "{{.EXTRA_ARGS}}"
  eslint:
    taskfile: taskfiles/eslint/Taskfile.yml
    dir: .
    vars:
      PM_OVERRIDE: "{{.PM}}"
      ESLINT_TARGETS_OVERRIDE: "{{.TARGETS}}"
      CONFIG_OVERRIDE: "{{.CONFIG}}"
      CACHE_OVERRIDE: "{{.CACHE}}"
      EXTRA_ARGS_OVERRIDE: "{{.EXTRA_ARGS}}"
  prettier:
    taskfile: taskfiles/prettier/Taskfile.yml
    dir: .
    vars:
      PM_OVERRIDE: "{{.PM}}"
      PRETTIER_TARGETS_OVERRIDE: "{{.TARGETS}}"
      CONFIG_OVERRIDE: "{{.CONFIG}}"
      IGNORE_PATH_OVERRIDE: "{{.IGNORE_PATH}}"
      EXTRA_ARGS_OVERRIDE: "{{.EXTRA_ARGS}}"
  biome:
    taskfile: taskfiles/biome/Taskfile.yml
    dir: .
    vars:
      PM_OVERRIDE: "{{.PM}}"
      BIOME_TARGETS_OVERRIDE: "{{.TARGETS}}"
      CONFIG_OVERRIDE: "{{.CONFIG}}"
      EXTRA_ARGS_OVERRIDE: "{{.EXTRA_ARGS}}"
  bruno:
    taskfile: taskfiles/bruno/Taskfile.yml
    dir: .
    vars:
      PM_OVERRIDE: "{{.PM}}"
      COLLECTION_OVERRIDE: "{{.COLLECTION}}"
      ENV_OVERRIDE: "{{.ENV}}"
      EXTRA_ARGS_OVERRIDE: "{{.EXTRA_ARGS}}"
  stylelint:
    taskfile: taskfiles/stylelint/Taskfile.yml
    dir: .
    vars:
      PM_OVERRIDE: "{{.PM}}"
      STYLELINT_TARGETS_OVERRIDE: "{{.TARGETS}}"
      CONFIG_OVERRIDE: "{{.CONFIG}}"
      CACHE_OVERRIDE: "{{.CACHE}}"
      ALLOW_EMPTY_INPUT_OVERRIDE: "{{.ALLOW_EMPTY_INPUT}}"
      EXTRA_ARGS_OVERRIDE: "{{.EXTRA_ARGS}}"
  knip:
    taskfile: taskfiles/knip/Taskfile.yml
    dir: .
    vars:
      PM_OVERRIDE: "{{.PM}}"
      CONFIG_OVERRIDE: "{{.CONFIG}}"
      EXTRA_ARGS_OVERRIDE: "{{.EXTRA_ARGS}}"
  depcheck:
    taskfile: taskfiles/depcheck/Taskfile.yml
    dir: .
    vars:
      PM_OVERRIDE: "{{.PM}}"
      DEPCHECK_TARGETS_OVERRIDE: "{{.TARGETS}}"
      DEPCHECK_PROJECT_PATH_OVERRIDE: "{{.PROJECT_PATH}}"
      IGNORE_PACKAGES_OVERRIDE: "{{.IGNORE_PACKAGES}}"
      EXTRA_ARGS_OVERRIDE: "{{.EXTRA_ARGS}}"
  actionlint:
    taskfile: taskfiles/actionlint/Taskfile.yml
    vars:
      TARGETS_OVERRIDE: "{{.TARGETS}}"
      EXTRA_ARGS_OVERRIDE: "{{.EXTRA_ARGS}}"
  buf:
    taskfile: taskfiles/buf/Taskfile.yml
    vars:
      CONFIG_OVERRIDE: "{{.CONFIG}}"
      INPUT_OVERRIDE: "{{.INPUT}}"
      AGAINST_OVERRIDE: "{{.AGAINST}}"
      EXTRA_ARGS_OVERRIDE: "{{.EXTRA_ARGS}}"
  bun:
    taskfile: taskfiles/bun/Taskfile.yml
  corepack:
    taskfile: taskfiles/corepack/Taskfile.yml
  docker:
    taskfile: taskfiles/docker/Taskfile.yml
    vars:
      IMAGE_OVERRIDE: "{{.IMAGE}}"
      FILE_OVERRIDE: "{{.FILE}}"
      CONTEXT_OVERRIDE: "{{.CONTEXT}}"
      EXTRA_ARGS_OVERRIDE: "{{.EXTRA_ARGS}}"
  fnm:
    taskfile: taskfiles/fnm/Taskfile.yml
  gh:
    taskfile: taskfiles/gh/Taskfile.yml
  git:
    taskfile: taskfiles/git/Taskfile.yml
  go:
    taskfile: taskfiles/go/Taskfile.yml
  jq:
    taskfile: taskfiles/jq/Taskfile.yml
  hadolint:
    taskfile: taskfiles/hadolint/Taskfile.yml
    vars:
      DOCKERFILE_OVERRIDE: "{{.DOCKERFILE}}"
      CONFIG_OVERRIDE: "{{.CONFIG}}"
      EXTRA_ARGS_OVERRIDE: "{{.EXTRA_ARGS}}"
  js-pm:
    taskfile: taskfiles/js-pm/Taskfile.yml
  npm:
    taskfile: taskfiles/npm/Taskfile.yml
  nvm:
    taskfile: taskfiles/nvm/Taskfile.yml
  pnpm:
    taskfile: taskfiles/pnpm/Taskfile.yml
  proto:
    taskfile: taskfiles/proto/Taskfile.yml
    vars:
      PROTO_PATH_OVERRIDE: "{{.PROTO_PATH}}"
      PROTO_PATTERN_OVERRIDE: "{{.PROTO_PATTERN}}"
  python:
    taskfile: taskfiles/python/Taskfile.yml
    vars:
      FILE_OVERRIDE: "{{.FILE}}"
      EXTRA_ARGS_OVERRIDE: "{{.EXTRA_ARGS}}"
  shellcheck:
    taskfile: taskfiles/shellcheck/Taskfile.yml
    vars:
      TARGETS_OVERRIDE: "{{.TARGETS}}"
      EXTRA_ARGS_OVERRIDE: "{{.EXTRA_ARGS}}"
  sqlfluff:
    taskfile: taskfiles/sqlfluff/Taskfile.yml
    vars:
      TARGETS_OVERRIDE: "{{.TARGETS}}"
      CONFIG_OVERRIDE: "{{.CONFIG}}"
      DIALECT_OVERRIDE: "{{.DIALECT}}"
      EXTRA_ARGS_OVERRIDE: "{{.EXTRA_ARGS}}"
  staticcheck:
    taskfile: taskfiles/staticcheck/Taskfile.yml
  typescript:
    taskfile: taskfiles/typescript/Taskfile.yml
  uv:
    taskfile: taskfiles/uv/Taskfile.yml
    vars:
      PYTHON_VERSION_OVERRIDE: "{{.PYTHON_VERSION}}"
      FILE_OVERRIDE: "{{.FILE}}"
      TOOL_OVERRIDE: "{{.TOOL}}"
      EXTRA_ARGS_OVERRIDE: "{{.EXTRA_ARGS}}"
  vault:
    taskfile: taskfiles/vault/Taskfile.yml
    vars:
      VAULT_ADDR_OVERRIDE: "{{.VAULT_ADDR}}"
      KEYS_FILE_OVERRIDE: "{{.KEYS_FILE}}"
      SHARES_OVERRIDE: "{{.SHARES}}"
      THRESHOLD_OVERRIDE: "{{.THRESHOLD}}"
      SNAPSHOT_FILE_OVERRIDE: "{{.SNAPSHOT_FILE}}"
      VAULT_FILE_OVERRIDE: "{{.VAULT_FILE}}"
      ROOT_TOKEN_OVERRIDE: "{{.ROOT_TOKEN}}"
      ROLE_ID_OVERRIDE: "{{.ROLE_ID}}"
      SECRET_ID_OVERRIDE: "{{.SECRET_ID}}"
      APPROLE_MOUNT_OVERRIDE: "{{.APPROLE_MOUNT}}"
      EXTRA_ARGS_OVERRIDE: "{{.EXTRA_ARGS}}"
  yamllint:
    taskfile: taskfiles/yamllint/Taskfile.yml
    dir: .
    vars:
      TARGETS_OVERRIDE: "{{.TARGETS}}"
      CONFIG_OVERRIDE: "{{.CONFIG}}"
      EXTRA_ARGS_OVERRIDE: "{{.EXTRA_ARGS}}"
  yarn:
    taskfile: taskfiles/yarn/Taskfile.yml
  zizmor:
    taskfile: taskfiles/zizmor/Taskfile.yml
    vars:
      TARGETS_OVERRIDE: "{{.TARGETS}}"
      EXTRA_ARGS_OVERRIDE: "{{.EXTRA_ARGS}}"

vars:
  PM: ""
  TARGETS: ""
  CONFIG: ""
  INPUT: ""
  AGAINST: ""
  PROTO_PATH: ""
  PROTO_PATTERN: ""
  CACHE: ""
  FILE: ""
  EXTRA_ARGS: ""
  IGNORE_PATH: ""
  ALLOW_EMPTY_INPUT: ""
  IGNORE_PACKAGES: ""
  PROJECT_PATH: ""
  VAULT_ADDR: ""
  KEYS_FILE: ""
  SHARES: ""
  THRESHOLD: ""
  SNAPSHOT_FILE: ""
  VAULT_FILE: ""
  ROOT_TOKEN: ""
  ROLE_ID: ""
  SECRET_ID: ""
  APPROLE_MOUNT: ""

tasks:
  default:
    desc: List available tasks
    summary: Show all tasks available in this Taskfile and its includes.
    silent: true
    cmds:
      - task --list

  install:tools:
    desc: Install JS/TS linting, formatting, and dependency-audit tools
    summary: Install ESLint, Prettier, Biome, Stylelint, Knip, and Depcheck as local devDependencies.
    cmds:
      - task: eslint:install
      - task: prettier:install
      - task: biome:install
      - task: stylelint:install
      - task: knip:install
      - task: depcheck:install

  check:
    desc: Run all JS/TS checks
    summary: Run non-mutating checks across linting, formatting, Biome, Stylelint, Knip, and Depcheck.
    cmds:
      - task: eslint:check
      - task: prettier:check
      - task: biome:check
      - task: stylelint:check
      - task: knip:check
      - task: depcheck:check

  fix:
    desc: Apply safe JS/TS source fixes
    summary: Run source-formatting and lint-fix tasks. Dependency removals remain manual.
    cmds:
      - task: eslint:fix
      - task: prettier:write
      - task: biome:check:write
      - task: stylelint:fix

  lint:
    desc: Run JS/TS lint tasks
    summary: Run ESLint, Biome lint, and Stylelint checks without modifying files.
    cmds:
      - task: eslint:check
      - task: biome:lint
      - task: stylelint:check

  format:
    desc: Format JS/TS project files
    summary: Run Prettier write and Biome format write tasks.
    cmds:
      - task: prettier:write
      - task: biome:format:write

  audit:deps:
    desc: Audit dependency usage
    summary: Run Knip and Depcheck for unused files, exports, and dependencies. Review results before deleting anything.
    cmds:
      - task: knip:check
      - task: depcheck:check

  ci:
    desc: Run CI-friendly JS/TS checks
    summary: Run strict tool checks intended for continuous integration.
    cmds:
      - task: eslint:ci
      - task: prettier:ci
      - task: biome:ci
      - task: stylelint:ci
      - task: knip:ci
      - task: depcheck:ci

  clean:caches:
    desc: Clean tool caches
    summary: Remove caches created by tools that use local cache directories.
    cmds:
      - task: eslint:cache:clean
      - task: biome:cache:clean
      - task: stylelint:cache:clean

  tools:versions:
    desc: Show installed tool versions
    summary: Print the locally resolved versions for all JS/TS tooling taskfiles.
    cmds:
      - task: eslint:version
      - task: prettier:version
      - task: biome:version
      - task: stylelint:version
      - task: knip:version
      - task: depcheck:version
